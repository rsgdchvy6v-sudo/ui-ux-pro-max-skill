<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>🌟 Learning Stars | نجوم التعلم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    /* ===== VARIABLES & RESET ===== */
    :root {
      --purple: #6C63FF;
      --pink:   #FF6B9D;
      --green:  #11998e;
      --orange: #F7971E;
      --correct:#4CAF50;
      --wrong:  #FF5252;
      --star:   #FFD700;
      --radius: 22px;
      --shadow: 0 8px 32px rgba(0,0,0,0.14);
      --fe:     'Nunito', sans-serif;
      --fa:     'Noto Sans Arabic', sans-serif;
    }
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    body {
      font-family: var(--fe);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 35%, #f953c6 70%, #ff6b9d 100%);
      background-size: 300% 300%;
      animation: gradShift 18s ease infinite;
      min-height: 100vh; min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none; width: 100%;
      min-height: 100vh; min-height: 100dvh;
      padding: 20px 16px 36px;
      flex-direction: column; align-items: center; gap: 16px;
    }
    .screen.active { display: flex; }

    /* ===== SHARED COMPONENTS ===== */
    .btn { border: none; border-radius: 50px; cursor: pointer;
           font-family: var(--fe); font-weight: 900;
           transition: transform .12s, opacity .12s; }
    .btn:active { transform: scale(.93); opacity: .82; }

    .back-btn { background: rgba(255,255,255,.2); color: white;
                width: 56px; height: 56px; font-size: 1.5rem;
                display: flex; align-items: center; justify-content: center; flex-shrink:0; }
    .btn-primary { background: linear-gradient(135deg,#667eea,#764ba2); color:white;
                   padding:16px 28px; font-size:1.05rem; min-height:60px; min-width:140px;
                   box-shadow:0 4px 16px rgba(102,126,234,.45); }
    .btn-green   { background: linear-gradient(135deg,#11998e,#38ef7d); color:white;
                   padding:16px 28px; font-size:1.05rem; min-height:60px; min-width:140px;
                   box-shadow:0 4px 16px rgba(17,153,142,.4); }
    .btn-orange  { background: linear-gradient(135deg,#F7971E,#FFD200); color:#333;
                   padding:16px 28px; font-size:1.05rem; min-height:60px; min-width:140px;
                   box-shadow:0 4px 16px rgba(247,151,30,.4); }

    .ar { font-family: var(--fa) !important; direction: rtl; }

    /* ===== PROFILE SCREEN ===== */
    #screen-profiles { justify-content: center; }
    .app-title { text-align: center; color: white; margin-bottom: 6px; }
    .app-title .en { font-size: 2.1rem; font-weight: 900; }
    .app-title .ar { font-size: 1.55rem; font-family: var(--fa); opacity: .88; display: block; margin-top: 2px; }

    .profiles-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px;
                     width: 100%; max-width: 720px; }
    .profile-card { background: rgba(255,255,255,.94); border-radius: 26px; padding: 22px 14px 18px;
                    text-align: center; cursor: pointer;
                    box-shadow: 0 8px 32px rgba(0,0,0,.16), 0 2px 8px rgba(255,255,255,.3) inset;
                    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
                    transition: transform .13s, box-shadow .15s; border: 2px solid rgba(255,255,255,.6);
                    display: flex; flex-direction: column; align-items: center; gap: 5px;
                    min-height: 165px; }
    .profile-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,.2); }
    .profile-card:active { transform: scale(.94); }
    .p-avatar   { font-size: 3rem; line-height: 1; }
    .p-name-en  { font-size: 1.3rem; font-weight: 900; }
    .p-name-ar  { font-size: 1.05rem; font-family: var(--fa); color: #666; font-weight: 700; }
    .p-meta     { font-size: .78rem; color: #aaa; font-weight: 700; }
    .p-level    { font-size: .88rem; font-weight: 900; color: var(--purple); }
    .p-stars    { font-size: .82rem; font-weight: 900; color: var(--star); }
    .p-streak   { font-size: .78rem; font-weight: 900; color: #F7971E; }
    .p-badges   { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
    .p-badge    { font-size: 1rem; line-height: 1; }

    /* ===== LANGUAGE SCREEN ===== */
    #screen-lang { justify-content: center; }
    .lang-greeting { color: white; text-align: center; }
    .lang-greeting .en { font-size: 1.8rem; font-weight: 900; }
    .lang-greeting .ar { font-size: 1.45rem; font-family: var(--fa); opacity: .88; display: block; margin-top: 4px; }
    .lang-subtitle { color: rgba(255,255,255,.82); font-size: 1rem; font-weight: 700; text-align: center; }

    .lang-grid { display: grid; grid-template-columns: repeat(2,1fr);
                 gap: 16px; width: 100%; max-width: 560px; margin-top: 8px; }
    .lang-card { background: white; border-radius: 28px; padding: 30px 18px;
                 text-align: center; cursor: pointer; box-shadow: var(--shadow);
                 transition: transform .13s; display: flex; flex-direction: column;
                 align-items: center; gap: 12px; min-height: 190px;
                 border: 4px solid transparent; }
    .lang-card:active { transform: scale(.93); }
    .lang-flag  { font-size: 3.8rem; line-height: 1; }
    .lang-name  { font-size: 1.5rem; font-weight: 900; }
    .lang-sub   { font-size: .9rem; color: #888; font-weight: 700; }

    /* ===== MENU SCREEN ===== */
    .menu-top { width: 100%; max-width: 720px;
                display: flex; align-items: center; justify-content: space-between; }
    .menu-profile-info { display: flex; align-items: center; gap: 10px; }
    .m-avatar   { font-size: 2.3rem; }
    .m-name-en  { font-size: 1.2rem; font-weight: 900; color: white; }
    .m-name-ar  { font-size: .9rem; font-family: var(--fa); color: rgba(255,255,255,.8); }
    .m-lang-badge { background: rgba(255,255,255,.22); color:white; padding: 8px 14px;
                    border-radius: 50px; font-size: .85rem; font-weight: 900; cursor: pointer; }
    .menu-level-bar { width: 100%; max-width: 720px; }
    .level-card { background: rgba(255,255,255,.15); border-radius: 16px;
                  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .level-left { color: white; }
    .level-title { font-size: 1.05rem; font-weight: 900; }
    .level-sub   { font-size: .8rem; opacity: .8; font-family: var(--fa); }
    .level-prog-wrap { flex: 1; margin: 0 14px; height: 10px;
                       background: rgba(255,255,255,.25); border-radius: 50px; overflow: hidden; }
    .level-prog-fill { height: 100%; background: var(--star);
                       border-radius: 50px; transition: width .5s ease; }
    .level-stars { color: var(--star); font-weight: 900; font-size: .95rem; }

    .menu-subtitle { color: white; text-align: center; width: 100%; max-width: 720px; }
    .menu-subtitle .en { font-size: 1.3rem; font-weight: 900; }
    .menu-subtitle .ar { font-size: 1rem; font-family: var(--fa); opacity: .85; display: block; }

    .subjects-grid { display: grid; grid-template-columns: repeat(2,1fr);
                     gap: 14px; width: 100%; max-width: 720px; }
    .subject-card { background: rgba(255,255,255,.93); border-radius: 24px; padding: 26px 14px 22px;
                    text-align: center; cursor: pointer;
                    box-shadow: 0 6px 24px rgba(0,0,0,.13), 0 2px 6px rgba(255,255,255,.25) inset;
                    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
                    transition: transform .13s, box-shadow .15s; display: flex; flex-direction: column;
                    align-items: center; gap: 10px; min-height: 148px; border: 2px solid rgba(255,255,255,.55); }
    .subject-card:hover { box-shadow: 0 10px 32px rgba(0,0,0,.18); }
    .subject-card:active { transform: scale(.94); }
    .s-icon    { font-size: 2.8rem; }
    .s-name-en { font-size: 1.05rem; font-weight: 900; }
    .s-name-ar { font-size: .9rem; font-family: var(--fa); color: #666; font-weight: 700; }

    /* ===== GAME SCREEN ===== */
    .game-top { width: 100%; max-width: 720px;
                display: flex; align-items: center; justify-content: space-between; }
    .game-label { display: flex; flex-direction: column; align-items: center; color: white; }
    .game-label .en { font-size: .95rem; font-weight: 900; }
    .game-label .ar { font-size: .8rem; font-family: var(--fa); opacity: .85; }
    .score-chip { background: var(--star); color: #333; font-weight: 900;
                  font-size: 1rem; padding: 10px 18px; border-radius: 50px;
                  min-height: 48px; display: flex; align-items: center; gap: 5px; }

    .progress-wrap { width: 100%; max-width: 720px;
                     background: rgba(255,255,255,.22); border-radius: 50px;
                     height: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--star);
                     border-radius: 50px; transition: width .4s ease; }

    .question-card { background: white; border-radius: 28px; padding: 26px 20px;
                     text-align: center; box-shadow: var(--shadow);
                     width: 100%; max-width: 720px; position: relative;
                     display: flex; flex-direction: column; align-items: center;
                     gap: 8px; min-height: 170px; animation: fadeUp .35s ease both; }
    .speak-btn { position: absolute; top: 10px; right: 12px;
                 background: #f0f0ff; border: none; border-radius: 50%;
                 width: 44px; height: 44px; font-size: 1.25rem; cursor: pointer;
                 display: flex; align-items: center; justify-content: center;
                 transition: background .15s, transform .12s; box-shadow: 0 2px 8px rgba(108,99,255,.15); }
    .speak-btn:active { background: #dddaff; transform: scale(.88); }
    .q-instr     { font-size: 1rem; color: #777; font-weight: 700; }
    .q-instr.ar  { font-family: var(--fa); color: #999; font-size: .9rem; }
    .q-math      { font-size: 3rem; font-weight: 900; color: #333; line-height: 1; }
    .q-count     { font-size: 2.6rem; line-height: 1.35; word-break: break-all; max-width: 340px; }
    .q-emoji     { font-size: 4rem; line-height: 1; }
    .q-word      { font-size: 1.8rem; font-weight: 900; color: #444; }
    .q-word.ar   { font-family: var(--fa); }
    .q-letter-ar { font-size: 5rem; font-family: var(--fa); font-weight: 900; color: var(--purple); line-height: 1; }
    .q-letter-en { font-size: 4.5rem; font-weight: 900; color: var(--purple); line-height: 1; }
    .q-hint      { font-size: .85rem; color: #bbb; font-weight: 700; }

    .feedback { min-height: 38px; width: 100%; max-width: 720px;
                text-align: center; font-weight: 900; font-size: 1.1rem;
                color: white; text-shadow: 0 2px 6px rgba(0,0,0,.2);
                opacity: 0; transition: opacity .25s; }
    .feedback.show { opacity: 1; }
    .feedback .l1 { display: block; }
    .feedback .l2 { display: block; font-family: var(--fa); font-size: .9rem; margin-top: 2px; opacity: .88; }

    .choices-grid { display: grid; gap: 12px; width: 100%; max-width: 720px;
                    animation: fadeUp .38s .06s ease both; }
    .choices-grid.g3 { grid-template-columns: repeat(3,1fr); }
    .choices-grid.g4 { grid-template-columns: repeat(2,1fr); }
    .choices-grid.g5 { grid-template-columns: repeat(5,1fr); }

    .choice-btn { background: white; border: 3px solid #E0E0E0; border-radius: 18px;
                  padding: 14px 10px; font-weight: 900; color: #333; cursor: pointer;
                  min-height: 70px; display: flex; flex-direction: column;
                  align-items: center; justify-content: center; gap: 3px;
                  box-shadow: 0 3px 10px rgba(0,0,0,.08); font-family: var(--fe);
                  font-size: 1.2rem; transition: transform .1s; }
    .choice-btn:active { transform: scale(.91); }
    .choice-btn.big-ar { font-family: var(--fa); font-size: 2rem; direction: rtl; }
    .choice-btn .sub   { font-size: .72rem; color: #aaa; font-weight: 700; font-family: var(--fa); direction: rtl; }
    .choice-btn.correct { background: #E8F5E9; border-color: var(--correct); color: #2E7D32; animation: pulseOk .5s ease; }
    .choice-btn.wrong   { background: #FFEBEE; border-color: var(--wrong); color: #C62828; animation: shakeX .4s ease; }
    .choice-btn.dim     { pointer-events: none; opacity: .4; }

    /* ===== RESULTS SCREEN ===== */
    #screen-results { justify-content: center; }
    .results-card { background: white; border-radius: 30px; padding: 36px 22px 30px;
                    text-align: center; box-shadow: var(--shadow); width: 100%; max-width: 560px;
                    display: flex; flex-direction: column; align-items: center; gap: 14px;
                    animation: fadeUp .4s ease; }
    .res-emoji     { font-size: 5.5rem; animation: bounce .75s ease infinite alternate; }
    .res-title-en  { font-size: 1.85rem; font-weight: 900; color: #333; }
    .res-title-ar  { font-size: 1.4rem; font-family: var(--fa); color: #666; font-weight: 700; }
    .res-score     { font-size: 1.05rem; color: #999; font-weight: 700; }
    .stars-row     { font-size: 2.6rem; display: flex; gap: 6px; }
    .star-item.lit { animation: starPop .5s ease both; }
    .levelup-badge { background: linear-gradient(135deg,#FFD200,#F7971E);
                     color: #333; border-radius: 50px; padding: 10px 22px;
                     font-size: 1rem; font-weight: 900; display: none; }
    .levelup-badge.show { display: block; animation: fadeUp .4s .3s ease both; }
    .results-btns  { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
                     width: 100%; margin-top: 4px; }
    .r-btn-inner   { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .r-btn-inner .ar { font-family: var(--fa); font-size: .8em; }

    /* ===== LANGUAGE ISOLATION ===== */
    body.lang-en .ar-only { display: none !important; }
    body.lang-ar .en-only { display: none !important; }

    /* ===== CONFETTI ===== */
    #confetti-overlay { position:fixed; inset:0; pointer-events:none; z-index:9999; overflow:hidden; }
    .confetti-bit { position:absolute; top:-16px; border-radius:2px; animation: fall linear forwards; }

    /* ===== KEYFRAMES ===== */
    /* ===== BADGE TOAST ===== */
    .badge-toast {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
      background:linear-gradient(135deg,#FFD200,#F7971E); color:#333;
      border-radius:50px; padding:12px 22px; font-weight:900; font-size:1rem;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 8px 24px rgba(0,0,0,.22); z-index:9999;
      opacity:0; transition:opacity .3s, transform .3s; pointer-events:none;
    }
    .badge-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ===== MEMORY GAME ===== */
    .memory-grid {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:8px; width:100%; max-width:340px; margin:4px auto 0;
    }
    .mem-card { aspect-ratio:1; perspective:600px; cursor:pointer; }
    .mem-inner {
      width:100%; height:100%; position:relative; transform-style:preserve-3d;
      transition:transform .35s cubic-bezier(.4,0,.2,1); border-radius:12px;
    }
    .mem-card.flipped .mem-inner, .mem-card.matched .mem-inner { transform:rotateY(180deg); }
    .mem-front, .mem-back {
      position:absolute; width:100%; height:100%; backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      border-radius:12px; display:flex; align-items:center; justify-content:center;
    }
    .mem-front { background:linear-gradient(135deg,#667eea,#764ba2); color:white; font-size:1.5rem; }
    .mem-back  { background:white; border:3px solid #ddd; font-size:2rem; transform:rotateY(180deg); }
    .mem-card.matched .mem-back { background:#e8f5e9; border-color:#4caf50; animation:matchPop .35s ease; }

    /* ===== NUMBER ORDER GAME ===== */
    .numorder-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:10px; width:100%; max-width:280px; margin:8px auto 0;
    }
    .num-btn {
      background:white; border:3px solid #ddd; border-radius:16px;
      font-size:1.8rem; font-weight:900; height:70px; cursor:pointer;
      transition:all .2s; display:flex; align-items:center; justify-content:center;
      box-shadow:0 3px 10px rgba(0,0,0,.08);
    }
    .num-btn:active { transform:scale(.88); }
    .num-btn.tapped { background:#e8f5e9; border-color:#4caf50; color:#2e7d32; opacity:.6; pointer-events:none; }
    .num-btn.wrong-num { animation:shakeX .3s ease; border-color:#f44336; background:#ffebee; }

    /* ===== PUZZLE SECTION LABEL ===== */
    .section-label {
      width:100%; max-width:720px; margin-top:6px;
      display:flex; align-items:center; gap:10px; color:rgba(255,255,255,.9);
    }
    .section-label::before, .section-label::after {
      content:''; flex:1; height:1px; background:rgba(255,255,255,.3);
    }
    .section-label span { font-weight:900; font-size:1rem; white-space:nowrap; }

    @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    @keyframes matchPop  { 0%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.15)} 100%{transform:rotateY(180deg) scale(1)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulseOk  { 0%{transform:scale(1)} 40%{transform:scale(1.1)} 100%{transform:scale(1)} }
    @keyframes shakeX   { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-9px)} 75%{transform:translateX(9px)} }
    @keyframes bounce   { from{transform:translateY(0)} to{transform:translateY(-14px)} }
    @keyframes starPop  { 0%{transform:scale(0) rotate(-20deg)} 65%{transform:scale(1.25) rotate(8deg)} 100%{transform:scale(1) rotate(0)} }
    @keyframes fall     { to{transform:translateY(110vh) rotate(420deg);opacity:0} }

    /* ===== RESPONSIVE ===== */
    @media (max-width:480px) {
      .profiles-grid,.subjects-grid { gap:10px; }
      .profile-card { min-height:148px; padding:16px 10px 14px; }
      .p-avatar { font-size:2.6rem; }
      .subject-card { padding:18px 10px 14px; min-height:130px; }
      .s-icon { font-size:2.4rem; }
      .q-math { font-size:2.3rem; }
      .q-count { font-size:2.1rem; }
      .q-letter-ar { font-size:4rem; }
    }
    @media (min-width:900px) {
      .profiles-grid,.subjects-grid { grid-template-columns:repeat(4,1fr); }
      .lang-grid { grid-template-columns:repeat(2,1fr); }
    }
    @media (orientation:landscape) and (max-height:520px) {
      .screen { padding:10px 16px 16px; gap:10px; }
      .profile-card,.subject-card { min-height:110px; padding:12px; }
      .question-card { padding:16px; min-height:130px; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     SCREEN 1 — PROFILE SELECTION
============================================================= -->
<div id="screen-profiles" class="screen active">
  <div class="app-title" id="app-title">
    <span class="en">🌟 Learning Stars</span>
    <span class="ar">نجوم التعلم ✨</span>
  </div>
  <div class="profiles-grid" id="profiles-grid"><!-- JS --></div>
</div>

<!-- ============================================================
     SCREEN 2 — LANGUAGE SELECTION
============================================================= -->
<div id="screen-lang" class="screen">
  <button class="btn back-btn" style="align-self:flex-start" onclick="goProfiles()">←</button>
  <div class="lang-greeting" id="lang-greeting">
    <span class="en">Hello, Theyab! 👋</span>
    <span class="ar">أهلاً ثياب! 👋</span>
  </div>
  <div class="lang-subtitle">Choose your language / اختر لغتك</div>
  <div class="lang-grid">
    <div class="lang-card" onclick="selectLang('en')"
         style="border-color:#667eea55; background:linear-gradient(135deg,#fff 55%,#667eea14)">
      <div class="lang-flag">🇬🇧</div>
      <div class="lang-name" style="color:#667eea">English</div>
      <div class="lang-sub">Learn in English</div>
    </div>
    <div class="lang-card" onclick="selectLang('ar')"
         style="border-color:#F7971E55; background:linear-gradient(135deg,#fff 55%,#F7971E14)">
      <div class="lang-flag">🇦🇪</div>
      <div class="lang-name ar" style="color:#F7971E">العربية</div>
      <div class="lang-sub ar" style="font-size:.9rem">تعلّم بالعربية</div>
    </div>
  </div>
</div>

<!-- ============================================================
     SCREEN 3 — SUBJECT MENU
============================================================= -->
<div id="screen-menu" class="screen">
  <div class="menu-top" id="menu-top"><!-- JS --></div>
  <div class="menu-level-bar" id="menu-level-bar"><!-- JS --></div>
  <div class="menu-subtitle">
    <span class="en-only">Choose a Subject 🎓</span>
    <span class="ar-only ar">اختر المادة 🎓</span>
  </div>
  <div class="subjects-grid" id="subjects-grid"><!-- JS --></div>
  <div class="section-label"><span class="en-only">🧩 Puzzle Games</span><span class="ar-only ar">🧩 ألعاب الألغاز</span></div>
  <div class="subjects-grid" id="puzzles-grid"><!-- JS --></div>
</div>

<!-- ============================================================
     SCREEN 4 — GAME
============================================================= -->
<div id="screen-game" class="screen">
  <div class="game-top">
    <button class="btn back-btn" onclick="goMenu()">←</button>
    <div class="game-label">
      <span class="en en-only" id="gs-en">Math</span>
      <span class="ar ar-only" id="gs-ar">الرياضيات</span>
    </div>
    <div class="score-chip">⭐ <span id="score-display">0</span></div>
  </div>

// ================================================================

const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = rand(0, i);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function uniqueWrongs(correct, min, max, n) {
  const set = new Set();
  let tries = 0;
  while (set.size < n && tries++ < 300) {
    const v = rand(min, max);
    if (v !== correct) set.add(v);
  }
  let e = max + 1;
  while (set.size < n) set.add(e++);
  return [...set];
}

// ================================================================
//  LOCALSTORAGE
// ================================================================

function loadProg(id) {
  try { return JSON.parse(localStorage.getItem('ls_' + id)) || { stars: 0, games: 0 }; }
  catch(e) { return { stars: 0, games: 0 }; }
}

function saveProg(id, earned) {
  const p = loadProg(id);
  p.stars += earned; p.games += 1;
  try { localStorage.setItem('ls_' + id, JSON.stringify(p)); } catch(e) {}
}

function saveSession(id, session) {
  try {
    const key = 'ls_sessions_' + id;
    const arr = JSON.parse(localStorage.getItem(key) || '[]');
    arr.unshift(session);
    if (arr.length > 30) arr.pop();
    localStorage.setItem(key, JSON.stringify(arr));
  } catch(e) {}
}

function loadSessions(id) {
  try { return JSON.parse(localStorage.getItem('ls_sessions_' + id) || '[]'); }
  catch(e) { return []; }
}

function loadStreak(id) {
  try { return JSON.parse(localStorage.getItem('ls_streak_'+id)||'{"count":0,"lastDate":""}'); }
  catch(e) { return {count:0,lastDate:''}; }
}
function updateStreak(id) {
  const today = new Date().toISOString().slice(0,10);
  const s = loadStreak(id);
  const yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (s.lastDate===today) return s.count;
  s.count = (s.lastDate===yest) ? s.count+1 : 1;
  s.lastDate = today;
  try { localStorage.setItem('ls_streak_'+id, JSON.stringify(s)); } catch(e){}
  return s.count;
}

function loadBadges(id) {
  try { return JSON.parse(localStorage.getItem('ls_badges_'+id)||'[]'); }
  catch(e) { return []; }
}
function checkBadges(id) {
  const p = loadProg(id);
  const streak = loadStreak(id).count;
  const owned = loadBadges(id);
  const gained = [];
  for (const b of BADGES) {
    if (!owned.includes(b.id) && b.req(p, streak)) { gained.push(b); owned.push(b.id); }
  }
  if (gained.length) {
    try { localStorage.setItem('ls_badges_'+id, JSON.stringify(owned)); } catch(e){}
    gained.forEach((b,i) => setTimeout(()=>showBadgeToast(b), i*600));
  }
}
function showBadgeToast(badge) {
  const t = document.createElement('div');
  t.className = 'badge-toast';
  t.style.fontFamily = gameLang==='ar' ? 'var(--fa)' : 'var(--fe)';
  t.innerHTML = `<span style="font-size:1.5rem">${badge.emoji}</span><span>${gameLang==='ar'?badge.ar:badge.en}</span>`;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);

// ================================================================
//  SOUND EFFECTS (Web Audio API)
// ================================================================
let _audioCtx = null;
function _getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}
function playSound(type) {
  try {
    const ctx = _getAudioCtx();
    if (type==='correct') {
      [[523,0],[659,.1],[784,.2]].forEach(([f,t])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);o.frequency.value=f;
        g.gain.setValueAtTime(.25,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.32);
        o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.32);
      });
    } else if (type==='wrong') {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sawtooth';o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(320,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(200,ctx.currentTime+.28);
      g.gain.setValueAtTime(.18,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.32);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+.32);
    } else if (type==='flip') {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=880;o.connect(g);g.connect(ctx.destination);
      g.gain.setValueAtTime(.1,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.1);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+.1);
    } else if (type==='match') {
      [[659,0],[784,.1],[1047,.22]].forEach(([f,t])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);o.frequency.value=f;
        g.gain.setValueAtTime(.2,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.25);
        o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.25);
      });
    } else if (type==='levelup') {
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);o.frequency.value=f;
        g.gain.setValueAtTime(.22,ctx.currentTime+i*.12);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.12+.25);
        o.start(ctx.currentTime+i*.12);o.stop(ctx.currentTime+i*.12+.25);
      });
    }
  } catch(e){}
}

function getLevel(stars) {
  let lv = LEVELS[0];
  for (const l of LEVELS) if (stars >= l[0]) lv = l;
  return lv;
}

function nextLevelStars(stars) {
  for (let i = 0; i < LEVELS.length - 1; i++)
    if (stars < LEVELS[i + 1][0]) return LEVELS[i + 1][0];
  return null;
}

let _voices = [];

function _loadVoices() {
  _voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
}

if (window.speechSynthesis) {
  _loadVoices();
  window.speechSynthesis.onvoiceschanged = _loadVoices;
}

// Voice name preferences per language + gender
const VOICE_PREFS = {
  ar: {
    female: ['layla'],
    male:   ['maged', 'tarik'],
  },
  en: {
    female: ['samantha', 'karen', 'tessa', 'moira', 'allison', 'ava', 'fiona', 'victoria', 'susan'],
    male:   ['alex', 'daniel', 'fred', 'oliver', 'thomas', 'lee'],
  },
};

function _pickVoice(lang) {
  if (!_voices.length) _loadVoices();
  const prefix = lang.split('-')[0];
  const gender = activeProfile?.voice || 'female';
  const pool   = _voices.filter(v => v.lang.startsWith(prefix));
  if (!pool.length) return null;
  const prefs  = VOICE_PREFS[prefix]?.[gender] || [];
  // try preferred gender first, fall back to any voice in that language
  return pool.find(v => prefs.some(n => v.name.toLowerCase().includes(n))) || pool[0];
}

function _cleanText(text) {
  // Remove characters that cause TTS to mispronounce (?, !, ·, emojis, slash combos)
  return text
    .replace(/[?؟!·\/]/g, '')
    .replace(/\p{Emoji}/gu, '')
    .trim();
}

function speakSeq(parts) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  let i = 0;
  function next() {
    if (i >= parts.length) return;
    const p    = parts[i++];
    const utt  = new SpeechSynthesisUtterance(_cleanText(p.text));
    utt.lang   = p.lang  || 'en-US';
    utt.rate   = p.rate  || 1.0;
    utt.pitch  = p.pitch || 1.2;
    utt.volume = 1;
    const voice = _pickVoice(utt.lang);
    if (voice) utt.voice = voice;
    utt.onend   = () => setTimeout(next, 220);
    utt.onerror = () => setTimeout(next, 220);
    window.speechSynthesis.speak(utt);
  }
  setTimeout(next, 400);
}

function replayAudio() { speakSeq(currentAudio); }

function makeMathQ(age) {
  // Math is language-neutral; instructions bilingual
  const instrEN = 'What is the answer?';
  const instrAR = 'ما هي الإجابة؟';

  if (age <= 3) {
    const count  = rand(1, 5);
    const emo    = COUNT_EMOJIS[rand(0, COUNT_EMOJIS.length-1)];
    const objs   = Array(count).fill(emo.e).join(' ');
    const wrongs = uniqueWrongs(count, 1, 5, 4);
    const pool   = shuffle([count, ...wrongs]);
    return {
      html: `<div class="q-instr${gameLang==='ar'?' ar':''}">${gameLang==='en'?'How many?':'كم عدد؟'}</div>
             <div class="q-count">${objs}</div>`,
      choices: pool.map(n => ({ label: String(n), sub: '' })),
      correct: pool.indexOf(count),
      audio: gameLang === 'en'
        ? [{ text: `Count the ${emo.enP}. How many are there`, lang: 'en-US' }]
        : [{ text: `كم عدد`, lang: 'ar-SA' }],
    };
  }

  if (age <= 5) {
    let a, b, opSym, opLabel, ans;
    if (Math.random() < 0.5) { a=rand(1,8); b=rand(1,10-a); opSym='+'; opLabel='plus';  ans=a+b; }
    else                       { a=rand(2,10); b=rand(1,a-1); opSym='-'; opLabel='minus'; ans=a-b; }
    const pool = shuffle([ans, ...uniqueWrongs(ans, Math.max(0,ans-3), ans+3, 2)]);
    const displayOp = opSym === '+' ? '+' : '−';
    return {
      html: `<div class="q-instr${gameLang==='ar'?' ar':''}">${gameLang==='en'?instrEN:instrAR}</div>
             <div class="q-math">${a} ${displayOp} ${b} = ?</div>`,
      choices: pool.map(n => ({ label: String(n), sub: '' })),
      correct: pool.indexOf(ans),
      audio: gameLang === 'en'
        ? [{ text: `What is the answer`, lang: 'en-US' }]
        : [{ text: `ما هي الإجابة`, lang: 'ar-SA' }],
    };
  }

  const opDefs = [
    { sym: '+', display: '+', en: 'plus',  ar: 'زائد',      calc: (a,b)=>a+b, minA:4,  maxA:15, minB:4,  maxB:15 },
    { sym: '-', display: '−', en: 'minus', ar: 'ناقص',      calc: (a,b)=>a-b, minA:6,  maxA:20, minB:1,  maxB:null },
    { sym: '*', display: '×', en: 'times', ar: 'مضروب في', calc: (a,b)=>a*b, minA:2,  maxA:5,  minB:2,  maxB:5 },
  ];
  const opDef = opDefs[rand(0, opDefs.length - 1)];
  let a, b, ans;
  if (opDef.sym === '-') {
    a = rand(6, 20); b = rand(1, a - 1); ans = a - b;
  } else {
    a = rand(opDef.minA, opDef.maxA); b = rand(opDef.minB, opDef.maxB); ans = opDef.calc(a, b);
  }
  const pool = shuffle([ans, ...uniqueWrongs(ans, Math.max(1, ans-7), ans+7, 3)]);
  return {
    html: `<div class="q-instr${gameLang==='ar'?' ar':''}">${gameLang==='en'?instrEN:instrAR}</div>
           <div class="q-math">${a} ${opDef.display} ${b} = ?</div>`,
    choices: pool.map(n => ({ label: String(n), sub: '' })),
    correct: pool.indexOf(ans),
    audio: gameLang === 'en'
      ? [{ text: `What is the answer`, lang: 'en-US' }]
      : [{ text: `ما هي الإجابة`, lang: 'ar-SA' }],
  };
}

function makeLetterQ() {
  const pool = shuffle([...AR_LETTERS]);
  const tgt  = pool[0];

  if (gameLang === 'en') {
    // Show emoji + English word → tap the first letter
    const correctLetter = tgt.wordEn[0].toUpperCase();
    const distractors = [];
    for (const entry of pool.slice(1)) {
      const l = entry.wordEn[0].toUpperCase();
      if (l !== correctLetter && !distractors.includes(l)) {
        distractors.push(l);
        if (distractors.length >= 3) break;
      }
    }
    for (const c of 'ABCDEFGHIJKLMNOPQRSTUVWXYZ') {
      if (distractors.length >= 3) break;
      if (c !== correctLetter && !distractors.includes(c)) distractors.push(c);
    }
    const choices = shuffle([correctLetter, ...distractors.slice(0, 3)]);
    return {
      html: `<div class="q-instr">What is the first letter?</div>
             <div class="q-emoji">${tgt.emoji}</div>
             <div class="q-word">${tgt.wordEn}</div>`,
      choices: choices.map(l => ({ label: l, sub: '' })),
      correct: choices.indexOf(correctLetter),
      audio: [{ text: `What is the first letter of ${tgt.wordEn}?`, lang: 'en-US' }],
    };
  }

  // Arabic mode: show emoji + Arabic word → tap the first Arabic letter
  const dist    = pool.filter(l => l.ar !== tgt.ar).slice(0, 3);
  const choices = shuffle([tgt, ...dist]);
  return {
    html: `<div class="q-instr ar">ما هو أول حرف؟</div>
           <div class="q-emoji">${tgt.emoji}</div>
           <div class="q-word ar">${tgt.wordAr}</div>`,
    choices: choices.map(l => ({ label: l.ar, sub: '', bigAr: true })),
    correct: choices.indexOf(tgt),
    audio: [{ text: `ما هو أول حرف في كلمة ${tgt.wordAr}؟`, lang: 'ar-SA' }],
  };
}

function makePatternQ() {
  const age     = activeProfile.age;
  const catKeys = Object.keys(PATTERN_ELEMS);
  const cat     = shuffle([...PATTERN_ELEMS[catKeys[rand(0, catKeys.length - 1)]]]);

  let unitArr;
  if (age <= 3) {
    unitArr = [cat[0], cat[1]];                  // AB
  } else if (age <= 5) {
    unitArr = Math.random() < 0.5
      ? [cat[0], cat[1], cat[1]]                 // ABB
      : [cat[0], cat[0], cat[1]];                // AAB
  } else {
    unitArr = [cat[0], cat[1], cat[2] || cat[0]]; // ABC
  }

  const repeatCount = age <= 3 ? 3 : 2;
  const seq = [];
  for (let r = 0; r < repeatCount; r++) seq.push(...unitArr);
  const answer = unitArr[0];

  const seqHtml = seq.map(e => `<span style="font-size:2rem">${e}</span>`).join(' ')
    + ' <span style="font-size:2rem">❓</span>';

  const wrongPool = cat.filter(e => e !== answer);
  let wrongs = shuffle(wrongPool).slice(0, 3);
  if (wrongs.length < 3) {
    for (const ck of catKeys) {
      if (wrongs.length >= 3) break;
      for (const e of PATTERN_ELEMS[ck]) {
        if (e !== answer && !wrongs.includes(e)) { wrongs.push(e); }
      }
    }
  }
  const choices = shuffle([answer, ...wrongs.slice(0, 3)]);

  const instrEn = 'What comes next?';
  const instrAr = 'ما الذي يأتي بعد ذلك؟';
  return {
    html: `<div class="q-instr${gameLang==='ar'?' ar':''}">${gameLang==='en'?instrEn:instrAr}</div>
           <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px 0">${seqHtml}</div>`,
    choices: choices.map(e => ({ label: e, sub: '' })),
    correct: choices.indexOf(answer),
    audio: gameLang === 'en'
      ? [{ text: 'What comes next in the pattern?', lang: 'en-US' }]
      : [{ text: 'ما الذي يأتي بعد ذلك؟', lang: 'ar-SA' }],
  };
}

function svgShape(key, fill, size) {
  const s = size, f = fill;
  switch(key) {
    case 'circle':
      return `<svg width="${s}" height="${s}" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="${f}"/></svg>`;
    case 'square':
      return `<svg width="${s}" height="${s}" viewBox="0 0 100 100"><rect x="7" y="7" width="86" height="86" rx="10" fill="${f}"/></svg>`;
    case 'triangle':
      return `<svg width="${s}" height="${s}" viewBox="0 0 100 100"><polygon points="50,7 93,93 7,93" fill="${f}"/></svg>`;
    case 'star':
      return `<svg width="${s}" height="${s}" viewBox="0 0 100 100"><polygon points="50,7 61,37 94,37 68,58 79,89 50,70 21,89 32,58 6,37 39,37" fill="${f}"/></svg>`;
    case 'heart':
      return `<svg width="${s}" height="${s}" viewBox="0 0 100 100"><path d="M50,86C50,86,14,60,14,35C14,19,27,11,37,14C43,16,48,21,50,26C52,21,57,16,63,14C73,11,86,19,86,35C86,60,50,86,50,86Z" fill="${f}"/></svg>`;
    case 'rectangle':
      return `<svg width="${Math.round(s*1.5)}" height="${Math.round(s*.7)}" viewBox="0 0 150 70"><rect x="4" y="4" width="142" height="62" rx="10" fill="${f}"/></svg>`;
    default:
      return `<svg width="${s}" height="${s}" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="${f}"/></svg>`;
  }
}

function makeOppositeQ() {
  const pair = OPPOSITES_DATA[rand(0, OPPOSITES_DATA.length-1)];
  const askFirst = Math.random() < 0.5;
  const srcEmoji = askFirst ? pair.emoji1 : pair.emoji2;
  const srcWord  = askFirst ? (gameLang==='en'?pair.en[0]:pair.ar[0]) : (gameLang==='en'?pair.en[1]:pair.ar[1]);
  const ansWord  = askFirst ? (gameLang==='en'?pair.en[1]:pair.ar[1]) : (gameLang==='en'?pair.en[0]:pair.ar[0]);
  const wrongs = shuffle(OPPOSITES_DATA.filter(p=>p!==pair)).slice(0,3)
    .map(p => gameLang==='en' ? p.en[rand(0,1)] : p.ar[rand(0,1)]);
  const choices = shuffle([ansWord, ...wrongs]);
  return {
    html: `<div class="q-instr${gameLang==='ar'?' ar':''}">${gameLang==='en'?'What is the opposite?':'ما الضد؟'}</div>
           <div class="q-emoji">${srcEmoji}</div>
           <div class="q-word${gameLang==='ar'?' ar':''}">${srcWord}</div>`,
    choices: choices.map(w=>({label:w, sub:'', bigAr:gameLang==='ar'})),
    correct: choices.indexOf(ansWord),
    audio: gameLang==='en'
      ? [{text:`What is the opposite of ${srcWord}?`, lang:'en-US'}]
      : [{text:`ما ضد كلمة ${srcWord}؟`, lang:'ar-SA'}],
  };
}

function makeBodyQ() {
  const pool = shuffle([...BODY_PARTS]);
  const tgt  = pool[0];
  const choices = shuffle([tgt, ...pool.slice(1,4)]);
  if (gameLang==='en') return {
    html: `<div class="q-instr">What part of the body is this?</div><div class="q-emoji">${tgt.emoji}</div>`,
    choices: choices.map(b=>({label:b.en, sub:''})),
    correct: choices.indexOf(tgt),
    audio: [{text:'What part of the body is this?', lang:'en-US'}],
  };
  return {
    html: `<div class="q-instr ar">ما هذا الجزء من الجسم؟</div><div class="q-emoji">${tgt.emoji}</div>`,
    choices: choices.map(b=>({label:b.ar, sub:'', bigAr:true})),
    correct: choices.indexOf(tgt),
    audio: [{text:'ما هذا الجزء من الجسم؟', lang:'ar-SA'}],
  };
}

function makeMissingNumQ() {
  const age = activeProfile.age;
  let a, b, ans, pool, opDisplay;
  if (age <= 3) {
    a=rand(1,3); b=rand(1,4-a); ans=a+b; opDisplay='+';
  } else if (age <= 5) {
    if (Math.random()<0.6) { a=rand(2,7); b=rand(2,7); ans=a+b; opDisplay='+'; }
    else { a=rand(4,10); b=rand(1,a-1); ans=a-b; opDisplay='−'; }
  } else {
    if (Math.random()<0.5) { a=rand(5,15); b=rand(3,12); ans=a+b; opDisplay='+'; }
    else { a=rand(8,20); b=rand(2,a-1); ans=a-b; opDisplay='−'; }
  }
  pool = shuffle([b, ...uniqueWrongs(b, Math.max(1,b-4), b+4, 3)]);
  const instrEn='Find the missing number!', instrAr='أوجد الرقم المفقود!';
  return {
    html: `<div class="q-instr${gameLang==='ar'?' ar':''}">${gameLang==='en'?instrEn:instrAr}</div>
           <div class="q-math">${a} ${opDisplay} <span style="color:var(--purple);font-size:3.2rem">?</span> = ${ans}</div>`,
    choices: pool.map(n=>({label:String(n), sub:''})),
    correct: pool.indexOf(b),
    audio: gameLang==='en'?[{text:instrEn,lang:'en-US'}]:[{text:instrAr,lang:'ar-SA'}],
  };
}

function makeOddOutQ() {
  const d = ODD_OUT_DATA[rand(0, ODD_OUT_DATA.length-1)];
  return {
    html: `<div class="q-instr${gameLang==='ar'?' ar':''}">${gameLang==='en'?d.instrEn:d.instrAr}</div>`,
    choices: d.items.map((e,i)=>({label:e, sub:'', idx:i})),
    correct: d.oddIdx,
    audio: gameLang==='en'?[{text:d.instrEn,lang:'en-US'}]:[{text:d.instrAr,lang:'ar-SA'}],
  };
}

let _memCards=[], _memFlipped=[], _memMatched=0, _memTotal=0, _memMoves=0, _memLock=false;

function startMemoryGame() {
  const numPairs = activeProfile.age<=3 ? 4 : activeProfile.age<=5 ? 5 : 6;
  const items = shuffle([...ANIMALS]).slice(0, numPairs);
  const cards = [];
  items.forEach((a,i)=>{
    cards.push({pairId:i, emoji:a.emoji, flipped:false, matched:false});
    cards.push({pairId:i, emoji:a.emoji, flipped:false, matched:false});
  });
  _memCards=shuffle(cards); _memFlipped=[]; _memMatched=0; _memTotal=numPairs; _memMoves=0; _memLock=false;
  activeSubject = PUZZLES.find(p=>p.id==='memory');
  lastSubjectId = 'memory';
  sessionScore = 0; currentSession = [];
  $('gs-en').textContent = 'Memory Flip'; $('gs-ar').textContent = 'لعبة الذاكرة';
  $('score-display').textContent = '0'; $('progress-fill').style.width = '0%';
  showScreen('screen-game');
  renderMemoryBoard();
}

function renderMemoryBoard() {
  $('choices-grid').innerHTML = ''; $('choices-grid').style.display = 'none';
  $('feedback').classList.remove('show');
  const inE='Find all matching pairs!', inA='ابحث عن كل الأزواج!';
  $('question-card').innerHTML = `
    <div class="q-instr${gameLang==='ar'?' ar':''}">${gameLang==='en'?inE:inA}</div>
    <div style="display:flex;gap:18px;font-size:.8rem;font-weight:900;color:#aaa;margin:2px 0 4px">
      <span>🎯 ${_memMoves} ${gameLang==='en'?'moves':'حركة'}</span>
      <span>✅ ${_memMatched}/${_memTotal} ${gameLang==='en'?'pairs':'أزواج'}</span>
    </div>
    <div class="memory-grid" id="memory-grid"></div>`;
  $('progress-fill').style.width = ((_memMatched/_memTotal)*100)+'%';
  const grid = $('memory-grid');
  _memCards.forEach((card,idx)=>{
    const div = document.createElement('div');
    div.className = 'mem-card'+(card.flipped||card.matched?' flipped':'')+(card.matched?' matched':'');
    div.innerHTML = `<div class="mem-inner"><div class="mem-front">❓</div><div class="mem-back">${card.emoji}</div></div>`;
    if (!card.matched) div.addEventListener('click',()=>onMemoryTap(idx));
    grid.appendChild(div);
  });
  if (_memMatched===0&&_memMoves===0) speakSeq([{text:gameLang==='en'?inE:inA, lang:gameLang==='en'?'en-US':'ar-SA'}]);
}

function onMemoryTap(idx) {
  if (_memLock) return;
  const card = _memCards[idx];
  if (card.matched||card.flipped||_memFlipped.includes(idx)) return;
  card.flipped=true; _memFlipped.push(idx);
  playSound('flip'); renderMemoryBoard();
  if (_memFlipped.length===2) {
    _memMoves++; _memLock=true;
    const [i1,i2] = _memFlipped;
    if (_memCards[i1].pairId===_memCards[i2].pairId) {
      _memCards[i1].matched=true; _memCards[i2].matched=true;
      _memMatched++; _memFlipped=[]; _memLock=false;
      playSound('match'); sessionScore++; $('score-display').textContent=sessionScore;
      renderMemoryBoard();
      if (_memMatched===_memTotal) setTimeout(()=>showSpecialResults('memory',_memTotal,3), 700);
    } else {
      setTimeout(()=>{
        _memCards[i1].flipped=false; _memCards[i2].flipped=false;
        _memFlipped=[]; _memLock=false; renderMemoryBoard();
      }, 900);
    }
  }
}

let _numList=[], _numNext=1, _numDone=[];

function startNumorderGame() {
  const n = activeProfile.age<=3 ? 4 : activeProfile.age<=5 ? 5 : 6;
  _numList = shuffle(Array.from({length:n},(_,i)=>i+1));
  _numNext=1; _numDone=[];
  activeSubject = PUZZLES.find(p=>p.id==='numorder');
  lastSubjectId = 'numorder'; sessionScore=0; currentSession=[];
  $('gs-en').textContent='Number Order'; $('gs-ar').textContent='ترتيب الأرقام';
  $('score-display').textContent='0'; $('progress-fill').style.width='0%';
  showScreen('screen-game'); renderNumorderBoard();
}

function renderNumorderBoard() {
  $('choices-grid').innerHTML=''; $('choices-grid').style.display='none';
  $('feedback').classList.remove('show');
  const inE='Tap numbers in order: 1, 2, 3…', inA='اضغط الأرقام بالترتيب: 1، 2، 3…';
  $('question-card').innerHTML = `
    <div class="q-instr${gameLang==='ar'?' ar':''}">${gameLang==='en'?inE:inA}</div>
    <div style="font-size:.85rem;color:#bbb;font-weight:700;margin-bottom:6px">${gameLang==='en'?'Next: '+_numNext:'التالي: '+_numNext}</div>
    <div class="numorder-grid" id="numorder-grid"></div>`;
  $('progress-fill').style.width=((_numDone.length/_numList.length)*100)+'%';
  const grid = $('numorder-grid');
  _numList.forEach(num=>{
    const btn = document.createElement('button');
    btn.className = 'num-btn'+(_numDone.includes(num)?' tapped':'');
    btn.textContent = num; btn.disabled = _numDone.includes(num);
    btn.addEventListener('click',()=>onNumorderTap(num));
    grid.appendChild(btn);
  });
  if (_numDone.length===0) speakSeq([{text:gameLang==='en'?inE:inA, lang:gameLang==='en'?'en-US':'ar-SA'}]);
}

function onNumorderTap(num) {
  if (num===_numNext) {
    playSound('correct'); _numDone.push(num); _numNext++; sessionScore++;
    $('score-display').textContent=sessionScore;
    if (_numDone.length===_numList.length) setTimeout(()=>showSpecialResults('numorder',_numList.length,3), 600);
    else renderNumorderBoard();
  } else {
    playSound('wrong');
    const btn = [...document.querySelectorAll('#numorder-grid .num-btn')].find(b=>+b.textContent===num);
    if (btn) { btn.classList.add('wrong-num'); setTimeout(()=>btn.classList.remove('wrong-num'),400); }
  }
}

    setTimeout(()=>playSound('levelup'),300);
  } else lub.classList.remove('show');
  showScreen('screen-results');
  launchConfetti(true);
}

function generateQuestions(subjectId, age) {
  const out = [];
  for (let i = 0; i < 10; i++) {
    switch(subjectId) {
      case 'math':     out.push(makeMathQ(age));    break;
      case 'letters':  out.push(makeLetterQ());     break;
      case 'animals':  out.push(makeAnimalQ());     break;
      case 'colors':   out.push(makeColorShapeQ()); break;
      case 'words':     out.push(makeWordQ());        break;
      case 'patterns':  out.push(makePatternQ());    break;
      case 'opposites': out.push(makeOppositeQ());   break;
      case 'body':      out.push(makeBodyQ());       break;
      case 'missing':   out.push(makeMissingNumQ()); break;
      case 'oddout':    out.push(makeOddOutQ());     break;
    }
  }
  return out;
}

function startGame(subjectId) {
  if (subjectId==='memory')   { startMemoryGame();   return; }
  if (subjectId==='numorder') { startNumorderGame(); return; }

  // Restore choices-grid if coming from a special game
  $('choices-grid').style.display = '';

  activeSubject = SUBJECTS.find(s=>s.id===subjectId) || PUZZLES.find(p=>p.id===subjectId);
  lastSubjectId = subjectId;
  questions     = generateQuestions(subjectId, activeProfile.age);
  qIdx          = 0;
  sessionScore  = 0;
  locked        = false;
  currentSession = [];

  $('gs-en').textContent = activeSubject.en;
  $('gs-ar').textContent = activeSubject.ar;
  $('gs-en').style.display = gameLang === 'en' ? '' : 'none';
  $('gs-ar').style.display = gameLang === 'ar' ? '' : 'none';
  $('score-display').textContent = '0';
  $('progress-fill').style.width = '0%';

  showScreen('screen-game');
  renderQ();
}

function renderQ() {
  const q = questions[qIdx];
  locked = false;

  $('progress-fill').style.width = (qIdx / questions.length * 100) + '%';
  $('score-display').textContent = sessionScore;

  const fb = $('feedback');
  fb.classList.remove('show');

  // Question
  const card = $('question-card');
  card.style.animation = 'none'; void card.offsetWidth; card.style.animation = '';
  card.innerHTML = q.html +
    `<button class="speak-btn" onclick="replayAudio()" title="Listen again">🔊</button>`;

  // Speak
  currentAudio = q.audio || [];
  speakSeq(currentAudio);

  // Choices
  const grid = $('choices-grid');
  const n = q.choices.length;
  grid.className = 'choices-grid ' + (n===3?'g3':n===5?'g5':'g4');
  grid.style.animation = 'none'; void grid.offsetWidth; grid.style.animation = '';
  grid.innerHTML = '';

  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (c.bigAr ? ' big-ar' : '');
    btn.innerHTML  = `<span>${c.label}</span>` +
                     (c.sub ? `<span class="sub">${c.sub}</span>` : '');
    btn.addEventListener('click', () => onAnswer(i));
    grid.appendChild(btn);
  });
}

function onAnswer(selected) {
  if (locked) return;
  locked = true;

  const q    = questions[qIdx];
  const ok   = selected === q.correct;
  playSound(ok ? 'correct' : 'wrong');
  document.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.classList.add('dim');
    if (i === q.correct) b.classList.add('correct');
    else if (i === selected && !ok) b.classList.add('wrong');
  });

  // Track Q&A for session report
  const qText = q.html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 120);
  currentSession.push({
    q:        qText,
    correct:  q.choices[q.correct].label,
    selected: q.choices[selected].label,
    ok,
  });

  if (ok) {
    sessionScore++;
    $('score-display').textContent = sessionScore;
    const m = MSGS_CORRECT[rand(0, MSGS_CORRECT.length-1)];
    showFeedback(m[0], m[1], '#86efac');
    if (sessionScore % 3 === 0) launchConfetti(false);
  } else {
    const m = MSGS_WRONG[rand(0, MSGS_WRONG.length-1)];
    showFeedback(m[0], m[1], '#fde68a');
  }

  setTimeout(() => {
    qIdx++;
    if (qIdx >= questions.length) showResults();
    else renderQ();
  }, 1300);
}

function showFeedback(l1, l2, col) {
  $('fb-l1').textContent = gameLang === 'en' ? l1 : l2;
  $('fb-l2').textContent = '';
  $('feedback').style.color = col;
  $('feedback').classList.add('show');
}

function showResults() {
  const total  = questions.length;
  const pct    = sessionScore / total;
  const earned = pct >= 0.9 ? 3 : pct >= 0.6 ? 2 : 1;

  const prevProg  = loadProg(activeProfile.id);
  const prevLevel = getLevel(prevProg.stars);

  saveProg(activeProfile.id, earned);
  updateStreak(activeProfile.id);
  checkBadges(activeProfile.id);

  // Save session record
  const now = new Date();
  saveSession(activeProfile.id, {
    ts:        now.getTime(),
    dateStr:   now.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }),
    timeStr:   now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }),
    subject:   activeSubject.id,
    subjectEn: activeSubject.en,
    subjectAr: activeSubject.ar,
    subjectEmoji: activeSubject.emoji,
    lang:      gameLang,
    score:     sessionScore,
    total:     questions.length,
    stars:     earned,
    qa:        [...currentSession],
  });
  currentSession = [];

  const newProg  = loadProg(activeProfile.id);
  const newLevel = getLevel(newProg.stars);

  const didLevelUp = LEVELS.indexOf(newLevel) > LEVELS.indexOf(prevLevel);

  const d = pct >= 0.9
    ? { emoji:'🏆', en:'Amazing Work!',  ar:'عمل مذهل!' }
    : pct >= 0.6
    ? { emoji:'🌟', en:'Great Job!',      ar:'عمل رائع!' }
    : { emoji:'💪', en:'Keep Trying!',    ar:'استمر في المحاولة!' };

  $('res-emoji').textContent    = d.emoji;
  $('res-title-en').textContent = gameLang === 'en' ? d.en : d.ar;
  $('res-title-en').className   = gameLang === 'ar' ? 'res-title-en ar' : 'res-title-en';
  $('res-title-ar').textContent = '';
  $('res-score').textContent = gameLang === 'en'
    ? `${sessionScore} / ${total} correct`
    : `${sessionScore} / ${total} صحيح`;

  const row = $('res-stars');
  row.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const sp = document.createElement('span');
    sp.className = 'star-item' + (i < earned ? ' lit' : '');
    sp.style.animationDelay = (i * 0.18) + 's';
    sp.textContent = i < earned ? '⭐' : '☆';
    row.appendChild(sp);
  }

  const lub = $('levelup-badge');
  if (didLevelUp) {
    lub.textContent = gameLang === 'en'
      ? `${newLevel[3]} Level Up! → ${newLevel[1]}`
      : `${newLevel[3]} ارتقيت مستوى! → ${newLevel[2]}`;
    lub.classList.add('show');
    setTimeout(()=>playSound('levelup'), 300);
  } else {
    lub.classList.remove('show');
  }

  showScreen('screen-results');
  if (pct >= 0.9) launchConfetti(true);
}

function playAgain() {
  if (lastSubjectId==='memory')   startMemoryGame();
  else if (lastSubjectId==='numorder') startNumorderGame();
  else startGame(lastSubjectId);
}

function showParentDashboard() {
  const L = PL[parentLang];
  const isAr = parentLang === 'ar';

  $('parent-title').textContent = L.title;
  $('parent-lang-btn').textContent = parentLang === 'en' ? 'AR | عر' : 'EN';
  $('parent-lang-btn').style.fontFamily = isAr ? 'var(--fa)' : 'var(--fe)';

  const grid = $('parent-grid');
  grid.innerHTML = PROFILES.map(p => {
    const prog  = loadProg(p.id);
    const lv    = getLevel(prog.stars);
    const lvIdx = LEVELS.indexOf(lv);
    const nextS = nextLevelStars(prog.stars);
    const pct   = nextS ? Math.round(((prog.stars - lv[0]) / (nextS - lv[0])) * 100) : 100;
    const name  = isAr ? p.nameAr : p.nameEn;
    const grade = isAr ? p.gradeAr : p.gradeEn;
    const lvName= isAr ? lv[2] : lv[1];
    const progressText = nextS
      ? `${prog.stars} / ${nextS} ${L.toNext}`
      : L.maxLevel;
    const sessions = loadSessions(p.id);
    const lastPlayed = sessions.length
      ? sessions[0].dateStr + ' ' + sessions[0].timeStr
      : '—';
    return `
      <div style="background:white;border-radius:20px;padding:18px 20px;box-shadow:var(--shadow);border-left:6px solid ${p.color};direction:${isAr?'rtl':'ltr'}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <span style="font-size:2.2rem">${p.avatar}</span>
          <div style="flex:1">
            <div style="font-weight:900;font-size:1.1rem;color:${p.color};font-family:${isAr?'var(--fa)':'var(--fe)'}">${name}</div>
            <div style="color:#999;font-size:.8rem;font-weight:700;font-family:${isAr?'var(--fa)':'var(--fe)'}">
              ${grade} · ${L.age} ${p.age}
            </div>
          </div>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;font-weight:700;font-size:.85rem;color:#555;margin-bottom:8px;font-family:${isAr?'var(--fa)':'var(--fe)'}">
          <span>⭐ <strong>${prog.stars}</strong> ${L.stars}</span>
          <span>🎮 <strong>${prog.games}</strong> ${L.games}</span>
          <span>${lv[3]} <strong>${lvName}</strong> (${L.level} ${lvIdx+1})</span>
        </div>
        <div style="background:#eee;border-radius:50px;height:9px;overflow:hidden;margin-bottom:4px">
          <div style="width:${pct}%;background:${p.color};height:100%;border-radius:50px;transition:width .5s"></div>
        </div>
        <div style="font-size:.73rem;color:#bbb;margin-bottom:12px;font-family:${isAr?'var(--fa)':'var(--fe)'}">${progressText}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <button onclick="openReport('${p.id}')"
            style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;padding:8px 14px;font-size:.8rem;font-weight:900;cursor:pointer;font-family:${isAr?'var(--fa)':'var(--fe)'}">
            ${L.viewReport}
          </button>
          <button onclick="exportReport('${p.id}')"
            style="background:linear-gradient(135deg,#11998e,#38ef7d);color:white;border:none;border-radius:12px;padding:8px 14px;font-size:.8rem;font-weight:900;cursor:pointer;font-family:${isAr?'var(--fa)':'var(--fe)'}">
            ${L.export}
          </button>
          <button onclick="toggleLevelPicker('${p.id}')"
            style="background:linear-gradient(135deg,#F7971E,#FFD200);color:#333;border:none;border-radius:12px;padding:8px 14px;font-size:.8rem;font-weight:900;cursor:pointer;font-family:${isAr?'var(--fa)':'var(--fe)'}">
            ${L.setLevel}
          </button>
          <button onclick="resetProgress('${p.id}')"
            style="background:#fff0f0;border:1.5px solid #ffb3b3;border-radius:12px;padding:8px 12px;font-size:.8rem;font-weight:900;color:#e55;cursor:pointer;font-family:${isAr?'var(--fa)':'var(--fe)'}">
            ${L.reset}
          </button>
        </div>
        <div id="lvpicker-${p.id}" style="display:none;flex-wrap:wrap;gap:7px;padding:10px;background:#f8f8ff;border-radius:12px;margin-top:2px">
          ${LEVELS.map((lv2, i2) => {
            const isActive = lvIdx === i2;
            return `<button onclick="applyLevel('${p.id}',${i2})"
              style="border:2px solid ${isActive ? p.color : '#ddd'};background:${isActive ? p.color : 'white'};color:${isActive ? 'white' : '#555'};border-radius:50px;padding:6px 13px;font-size:.82rem;font-weight:900;cursor:pointer;font-family:${isAr?'var(--fa)':'var(--fe)'}">
              ${lv2[3]} ${isAr ? lv2[2] : lv2[1]}
            </button>`;
          }).join('')}
          <button onclick="toggleLevelPicker('${p.id}')"
            style="border:none;background:none;color:#aaa;font-size:.8rem;font-weight:900;cursor:pointer;padding:6px;font-family:${isAr?'var(--fa)':'var(--fe)'}">
            ${L.cancelLevel}
          </button>
        </div>
      </div>`;
  }).join('');

  showScreen('screen-parent');
}

function resetProgress(profileId) {
  const msg = parentLang === 'en' ? 'Reset all progress for this child?' : 'هل تريد إعادة تعيين تقدم هذا الطفل؟';
  if (!confirm(msg)) return;
  try {
    localStorage.removeItem('ls_' + profileId);
    localStorage.removeItem('ls_sessions_' + profileId);
  } catch(e) {}
  showParentDashboard();
}

function toggleLevelPicker(profileId) {
  const el = $('lvpicker-' + profileId);
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

function applyLevel(profileId, levelIdx) {
  try {
    const p = loadProg(profileId);
    p.stars = LEVELS[levelIdx][0];
    localStorage.setItem('ls_' + profileId, JSON.stringify(p));
  } catch(e) {}
  showParentDashboard();
}

let _reportProfileId = null;

function openReport(profileId) {
  _reportProfileId = profileId;
  const L   = PL[parentLang];
  const isAr= parentLang === 'ar';
  const p   = PROFILES.find(pr => pr.id === profileId);
  const prog = loadProg(profileId);
  const lv   = getLevel(prog.stars);
  const sessions = loadSessions(profileId);

  $('rpt-back-lbl').textContent   = L.back;
  $('rpt-export-lbl').textContent = isAr ? 'تصدير PDF' : 'Export PDF';

  const sessionsHtml = sessions.length === 0
    ? `<p style="color:#aaa;text-align:center;padding:24px;font-family:${isAr?'var(--fa)':'var(--fe)'}">${L.noSessions}</p>`
    : sessions.map((s, idx) => {
        const correctCount = s.qa.filter(x => x.ok).length;
        const pct = Math.round(correctCount / s.qa.length * 100);
        const starsHtml = '⭐'.repeat(s.stars) + '☆'.repeat(3 - s.stars);
        const qaHtml = s.qa.map(item => `
          <div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:.82rem;direction:${isAr?'rtl':'ltr'}">
            <span style="font-size:1rem;flex-shrink:0">${item.ok ? '✅' : '❌'}</span>
            <div style="flex:1;color:#555">
              <span style="color:#333;font-weight:700">${item.q}</span>
              ${!item.ok ? `<span style="color:#e55;margin-left:6px">→ ${item.selected}</span> <span style="color:#4caf50">(${isAr?'الصحيح':'correct'}: ${item.correct})</span>` : ''}
            </div>
          </div>`).join('');
        return `
          <div style="border:1.5px solid #eee;border-radius:14px;margin-bottom:12px;overflow:hidden">
            <div style="background:#f8f8ff;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;direction:${isAr?'rtl':'ltr'}">
              <span style="font-size:1.4rem">${s.subjectEmoji}</span>
              <span style="font-weight:900;color:#444;font-family:${isAr?'var(--fa)':'var(--fe)'};font-size:.9rem">${isAr ? s.subjectAr : s.subjectEn}</span>
              <span style="background:${s.lang==='ar'?'#F7971E':'#667eea'};color:white;border-radius:50px;padding:2px 9px;font-size:.72rem;font-weight:900">${s.lang.toUpperCase()}</span>
              <span style="color:#888;font-size:.78rem;font-family:var(--fe)">${s.dateStr} ${s.timeStr}</span>
              <span style="margin-left:auto;font-weight:900;color:#333;font-size:.88rem">${correctCount}/${s.qa.length} ${starsHtml}</span>
              <button onclick="deleteSession('${profileId}',${idx})"
                style="background:#fff0f0;border:1.5px solid #ffb3b3;border-radius:8px;padding:3px 9px;font-size:.78rem;font-weight:900;color:#e55;cursor:pointer;flex-shrink:0">🗑</button>
            </div>
            <div style="padding:8px 14px">${qaHtml}</div>
          </div>`;
      }).join('');

  $('report-content').innerHTML = `
    <div style="direction:${isAr?'rtl':'ltr'}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <span style="font-size:2.8rem">${p.avatar}</span>
        <div>
          <div style="font-weight:900;font-size:1.25rem;color:${p.color};font-family:${isAr?'var(--fa)':'var(--fe)'}">
            ${isAr ? p.nameAr : p.nameEn}
          </div>
          <div style="color:#888;font-size:.85rem;font-family:${isAr?'var(--fa)':'var(--fe)'}">
            ${isAr ? p.gradeAr : p.gradeEn} · ${lv[3]} ${isAr ? lv[2] : lv[1]}
          </div>
        </div>
        <div style="margin-left:auto;text-align:${isAr?'left':'right'}">
          <div style="font-size:1.4rem;font-weight:900;color:#FFD700">⭐ ${prog.stars}</div>
          <div style="font-size:.78rem;color:#aaa;font-family:${isAr?'var(--fa)':'var(--fe)'}">${prog.games} ${L.games}</div>
        </div>
      </div>
      <hr style="border:none;border-top:1.5px solid #eee;margin-bottom:14px">
      ${sessionsHtml}
    </div>`;

  $('report-modal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeReport() {
  $('report-modal').style.display = 'none';
  document.body.style.overflow = '';
}

function deleteSession(profileId, idx) {
  const msg = parentLang === 'en' ? 'Delete this session?' : 'هل تريد حذف هذه الجلسة؟';
  if (!confirm(msg)) return;
  try {
    const key = 'ls_sessions_' + profileId;
    const arr = JSON.parse(localStorage.getItem(key) || '[]');
    arr.splice(idx, 1);
    localStorage.setItem(key, JSON.stringify(arr));
  } catch(e) {}
  openReport(profileId);
}

function exportReport(profileId) {
  const id  = profileId || _reportProfileId;
  if (!id) return;
  const L   = PL[parentLang];
  const isAr= parentLang === 'ar';
  const p   = PROFILES.find(pr => pr.id === id);
  const prog = loadProg(id);
  const lv   = getLevel(prog.stars);
  const sessions = loadSessions(id);
  const now  = new Date().toLocaleString('en-GB');

  const sessionsHtml = sessions.length === 0
    ? `<p style="color:#aaa">${L.noSessions}</p>`
    : sessions.map(s => {
        const correctCount = s.qa.filter(x => x.ok).length;
        const qaRows = s.qa.map(item => `
          <tr style="background:${item.ok ? '#f0fff4' : '#fff5f5'}">
            <td style="padding:5px 8px">${item.ok ? '✅' : '❌'}</td>
            <td style="padding:5px 8px;font-size:12px">${item.q}</td>
            <td style="padding:5px 8px;font-size:12px;color:#2e7d32">${item.correct}</td>
            <td style="padding:5px 8px;font-size:12px;color:${item.ok?'#2e7d32':'#c62828'}">${item.selected}</td>
          </tr>`).join('');
        return `
          <div style="margin-bottom:20px;page-break-inside:avoid">
            <div style="background:#f3f4f6;padding:8px 12px;border-radius:8px 8px 0 0;font-weight:bold">
              ${s.subjectEmoji} ${isAr ? s.subjectAr : s.subjectEn} | ${s.dateStr} ${s.timeStr} | ${correctCount}/${s.qa.length} ${'⭐'.repeat(s.stars)}
            </div>
            <table style="width:100%;border-collapse:collapse;font-family:sans-serif">
              <thead>
                <tr style="background:#667eea;color:white;font-size:12px">
                  <th style="padding:5px 8px;text-align:left"></th>
                  <th style="padding:5px 8px;text-align:left">Question</th>
                  <th style="padding:5px 8px;text-align:left">Correct Answer</th>
                  <th style="padding:5px 8px;text-align:left">Child's Answer</th>
                </tr>
              </thead>
              <tbody>${qaRows}</tbody>
            </table>
          </div>`;
      }).join('');

  const html = `<!DOCTYPE html>
<html dir="${isAr?'rtl':'ltr'}">
<head>
  <meta charset="UTF-8">
  <title>${L.reportFor} ${isAr ? p.nameAr : p.nameEn}</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: ${isAr?"'Noto Sans Arabic',":"'Nunito',"} sans-serif; margin: 32px; color: #222; }
    h1   { color: ${p.color}; }
    @media print { body { margin: 16px; } }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">
    <span style="font-size:3rem">${p.avatar}</span>
    <div>
      <h1 style="margin:0;font-size:1.6rem">${L.reportFor} ${isAr ? p.nameAr : p.nameEn}</h1>
      <p style="margin:4px 0;color:#666">${isAr ? p.gradeAr : p.gradeEn} · ${lv[3]} ${isAr ? lv[2] : lv[1]} · ⭐ ${prog.stars} ${L.stars} · 🎮 ${prog.games} ${L.games}</p>
      <p style="margin:4px 0;color:#aaa;font-size:.85rem">${L.generatedOn}: ${now}</p>
    </div>
  </div>
  <hr style="margin:16px 0;border:1.5px solid #eee">
  ${sessionsHtml}
  <script>window.onload=()=>window.print()<\/script>
</body></html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  window.open(url, '_blank');
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

// ================================================================
//  BOOT
// ================================================================

// Triple-tap title to open parent dashboard
let _tapCount = 0, _tapTimer = null;
document.getElementById('app-title').addEventListener('click', () => {
  _tapCount++;
  clearTimeout(_tapTimer);
  if (_tapCount >= 3) {
    _tapCount = 0;
    showParentDashboard();
  } else {
    _tapTimer = setTimeout(() => { _tapCount = 0; }, 700);
  }
});

// Auto-select profile via ?kid= URL param (e.g. ?kid=theyab)
const _kidParam = new URLSearchParams(window.location.search).get('kid');
if (_kidParam && PROFILES.find(p => p.id === _kidParam)) {
  selectProfile(_kidParam);
} else {
  renderProfiles();
}
</script>
</body>
</html>
